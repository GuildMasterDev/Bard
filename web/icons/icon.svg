<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="mask" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="mask2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Comedy mask (left, yellow) -->
  <g transform="translate(158 256) rotate(-14)">
    <path d="M -88 -92 C -88 -150, -40 -164, 0 -164 C 40 -164, 88 -150, 88 -92 C 88 -28, 72 82, 12 112 C 0 118, -12 118, -24 112 C -78 86, -88 -28, -88 -92 Z"
      fill="url(#mask2)" stroke="#0a0a0f" stroke-width="6"/>
    <!-- Eyes (smiling, closed) -->
    <path d="M -48 -70 Q -36 -90, -16 -70" fill="none" stroke="#0a0a0f" stroke-width="8" stroke-linecap="round"/>
    <path d="M 16 -70 Q 36 -90, 48 -70" fill="none" stroke="#0a0a0f" stroke-width="8" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M -44 18 Q 0 78, 44 18" fill="#0a0a0f"/>
    <path d="M -44 18 Q 0 32, 44 18" fill="none" stroke="#ffd6d6" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Tragedy mask (right, red) -->
  <g transform="translate(354 256) rotate(14)">
    <path d="M -88 -92 C -88 -150, -40 -164, 0 -164 C 40 -164, 88 -150, 88 -92 C 88 -28, 72 82, 12 112 C 0 118, -12 118, -24 112 C -78 86, -88 -28, -88 -92 Z"
      fill="url(#mask)" stroke="#0a0a0f" stroke-width="6"/>
    <!-- Eyes (sad, downturned) -->
    <path d="M -48 -60 Q -32 -80, -16 -60" fill="none" stroke="#0a0a0f" stroke-width="8" stroke-linecap="round" transform="rotate(180 -32 -70)"/>
    <path d="M 16 -60 Q 32 -80, 48 -60" fill="none" stroke="#0a0a0f" stroke-width="8" stroke-linecap="round" transform="rotate(180 32 -70)"/>
    <!-- Frown -->
    <path d="M -44 40 Q 0 -10, 44 40" fill="#0a0a0f"/>
  </g>
</svg>
